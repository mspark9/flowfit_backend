# fly.toml — Flowfit backend
# 배포 전에 `app` 이름을 본인 Fly 계정용으로 바꿔주세요.
# 전역 유일해야 하며, 소문자/숫자/하이픈만 가능합니다.

app = 'flowfit-backend-mspark-me0079'
primary_region = 'nrt'  # 도쿄 (서울과 가장 가까운 리전). 싱가포르는 'sin'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
